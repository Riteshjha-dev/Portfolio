<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 140">
  <defs>
    <linearGradient id="cGradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4d96ff"/>
      <stop offset="100%" stop-color="#4d96ff" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="cGradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c77dff"/>
      <stop offset="100%" stop-color="#c77dff" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- dashed connecting path -->
  <path d="M 55 70 Q 110 20 165 70" fill="none" stroke="#8888aa" stroke-width="1.5" stroke-dasharray="3 8" opacity="0.6"/>

  <!-- left node: you -->
  <circle cx="55" cy="70" r="34" fill="#12121a" stroke="url(#cGradA)" stroke-width="2.5"/>
  <text x="55" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="22" fill="#f0f0f8">RJ</text>

  <!-- right node: collaborator -->
  <circle cx="165" cy="70" r="34" fill="#12121a" stroke="url(#cGradB)" stroke-width="2.5"/>
  <text x="165" y="79" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="30" fill="#f0f0f8">?</text>

  <!-- spark where paths meet -->
  <g transform="translate(110,34)">
    <circle r="10" fill="#ffd93d" opacity="0.15"/>
    <path d="M -1 -7 L 3 -1 L -1 1 L 5 7 L -3 0 L 1 -2 Z" fill="#ffd93d"/>
  </g>

  <!-- small orbiting dots -->
  <circle cx="30" cy="30" r="3" fill="#6bcb77" opacity="0.7"/>
  <circle cx="190" cy="30" r="3" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="110" cy="118" r="3" fill="#4d96ff" opacity="0.6"/>
</svg>
